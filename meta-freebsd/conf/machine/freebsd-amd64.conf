#@TYPE: Machine
#@NAME: FreeBSD amd64
#@DESCRIPTION: FreeBSD/amd64 target built from the local freebsd-src tree.

DEFAULTTUNE ?= "core2-64"
require conf/machine/include/x86/tune-core2.inc

FREEBSD_TARGET ?= "amd64"
FREEBSD_TARGET_ARCH ?= "amd64"
FREEBSD_KERNEL_CONFIG ?= "GENERIC"

KERNEL_IMAGETYPE = "kernel"
MACHINE_FEATURES += "efi pci"

# Optional QEMU hints for developers who want to boot the deployed raw image.
QB_SYSTEM_NAME = "qemu-system-x86_64"
QB_MACHINE = "-machine q35"
QB_CPU = "-cpu qemu64"
QB_SMP ?= "-smp 4"
QB_MEM ?= "-m 1024"
QB_SERIAL_OPT = "-serial mon:stdio"
QB_ROOTFS_OPT = "-drive file=@ROOTFS@,format=raw,if=virtio"
