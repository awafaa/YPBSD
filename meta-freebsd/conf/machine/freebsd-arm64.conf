#@TYPE: Machine
#@NAME: FreeBSD arm64
#@DESCRIPTION: FreeBSD/arm64 target built from the local freebsd-src tree.

require conf/machine/include/arm/armv8a/tune-cortexa57.inc

FREEBSD_TARGET ?= "arm64"
FREEBSD_TARGET_ARCH ?= "aarch64"
FREEBSD_KERNEL_CONFIG ?= "GENERIC"

KERNEL_IMAGETYPE = "kernel"
MACHINE_FEATURES += "efi"

# Optional QEMU hints for developers who want to boot the deployed raw image.
QB_SYSTEM_NAME = "qemu-system-aarch64"
QB_MACHINE = "-machine virt"
QB_CPU = "-cpu cortex-a57"
QB_SMP ?= "-smp 4"
QB_MEM ?= "-m 1024"
QB_SERIAL_OPT = "-serial mon:stdio"
QB_ROOTFS_OPT = "-drive file=@ROOTFS@,format=raw,if=virtio"
