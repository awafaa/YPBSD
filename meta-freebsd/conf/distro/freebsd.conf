#@TYPE: Distribution
#@NAME: FreeBSD
#@DESCRIPTION: Build a FreeBSD kernel and FreeBSD userspace with BitBake.

DISTRO = "freebsd"
DISTRO_NAME = "FreeBSD"
DISTRO_VERSION ?= "14"
FREEBSD_ABI_VERSION ?= "${DISTRO_VERSION}"
TARGET_OS = "freebsd${FREEBSD_ABI_VERSION}"
INIT_MANAGER = "freebsd"

# Keep Linux and FreeBSD builds in separate output trees when a developer uses
# the same checkout and switches DISTRO/MACHINE.
TMPDIR ?= "${TOPDIR}/tmp-${DISTRO}-${MACHINE}"

DISTRO_FEATURES = "ipv4 ipv6 largefile"
MACHINE_FEATURES_OPTED_OUT += "rtc"

PREFERRED_PROVIDER_virtual/kernel ?= "freebsd-kernel"

HOSTTOOLS += " \
    basename bmake bunzip2 bzip2 c++ cc chmod chown cmp comm cp date dd \
    dirname echo env expr false find flex fmt gunzip gzip head hostname id ln \
    ls m4 mkdir mktemp mv nice patch realpath rm sh sleep stat tee time touch \
    tr true uname uniq unxz wc which xz yacc \
"
HOSTTOOLS_NONFATAL += "etdump makefs mkimg"

# OE-Core's cross-canadian class rewrites Linux target OS variants by default
# and fatals on target tuples it does not know. FreeBSD keeps a versioned
# FreeBSD TARGET_OS instead.
MODIFYTOS:freebsd:class-cross-canadian = "0"

# Go/Rust cross-canadian SDK packagegroups currently assume Linux targets.
SDK_TOOLCHAIN_LANGS:remove:freebsd = "go rust"

# These image recipes deploy whole FreeBSD artifacts directly instead of using
# OE package managers to compose the root filesystem.
IMAGE_CLASSES:remove = "image_types"
