# We have a conf and classes directory, add to BBPATH.
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES.
BBFILES += " \
    ${LAYERDIR}/recipes-*/*/*.bb \
    ${LAYERDIR}/recipes-*/*/*.bbappend \
"

BBFILE_COLLECTIONS += "ypbsd"
BBFILE_PATTERN_ypbsd = "^${LAYERDIR}/"
BBFILE_PRIORITY_ypbsd = "6"

LAYERSERIES_COMPAT_ypbsd = "blacksail"
LAYERVERSION_ypbsd = "1"

